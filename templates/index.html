<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Atencion Cliente</title>
</head>
<body>
   <table>
       <tr>
           <th>ID</th>
           <th>FECHA</th>
           <th>NOMBRES</th>
           <th>HORA INGRESO</th>
           <th>HORA SALIDA</th>
           <th>POLO</th>
           <th>LLAVERO</th>
           <th>CATALOGO</th>
       </tr>
       {% for row in attention %}
       <tr>
           <td>{{row.0}}</td>
           <td>{{row.1}}</td>
           <td>{{row.2}}</td>
           <td>{{row.3}}</td>
           <td>{{row.4}}</td>
           <td>{{row.5}}</td>
           <td>{{row.6}}</td>
           <td>{{row.7}}</td>
       </tr>
       {% endfor%}
   </table>
</body>
</html>
